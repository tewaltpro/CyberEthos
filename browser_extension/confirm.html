<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1b1b2f;
      color: #eaeaf0;
      margin: 0;
      padding: 24px;
      text-align: center;
    }
    p { font-size: 14px; line-height: 1.5; }
    button {
      border: none; border-radius: 8px; padding: 10px 16px;
      font-size: 14px; cursor: pointer; margin: 6px;
    }
    #confirm { background: #0f3460; color: white; }
    #cancel { background: #333; color: white; }
  </style>
</head>
<body>
  <p id="message">Do you want to keep this download?</p>
  <button id="confirm">Yes, keep it</button>
  <button id="cancel">Cancel</button>
  <script src="confirm.js"></script>
</body>
</html>
